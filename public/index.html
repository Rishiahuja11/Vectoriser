<!DOCTYPE html>
<html>
<head>
    <title>SVG Vectorizer</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .box { border: 2px dashed #ccc; padding: 40px; text-align: center; width: 300px; }
    </style>
</head>
<body>
    <h1>Vector Converter</h1>
    <form action="/convert" method="POST" enctype="multipart/form-data" class="box">
        <input type="file" name="image" accept="image/*" required>
        <br><br>
        <button type="submit">Convert to Vector</button>
    </form>
</body>
</html>
