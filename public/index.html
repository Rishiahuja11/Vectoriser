<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800 shadow-2xl w-full max-w-md text-center">
        <h1 class="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">VectorForge Pro</h1>
        <p class="text-gray-400 mb-8">AI-Powered Color Vectorization</p>
        
        <form id="uploadForm" class="space-y-6">
            <div class="relative group cursor-pointer border-2 border-dashed border-gray-700 rounded-2xl p-8 hover:border-cyan-500 transition-all">
                <input type="file" id="imageInput" class="absolute inset-0 opacity-0 cursor-pointer">
                <p class="text-gray-400">Click to upload image</p>
            </div>
            <button id="btn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 py-3 rounded-xl font-bold hover:scale-105 transition-transform">Convert to Vector</button>
        </form>

        <div id="loader" class="hidden mt-8 space-y-2">
            <div class="h-2 w-full bg-gray-800 rounded-full overflow-hidden">
                <div class="h-full bg-cyan-500 animate-pulse-slow w-1/2"></div>
            </div>
            <p class="text-xs text-cyan-400 uppercase tracking-widest font-bold">Processing vectors...</p>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('loader').classList.remove('hidden');
        };
    </script>
</body>
</html>
