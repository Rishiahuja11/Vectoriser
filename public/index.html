<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VectorForge Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/imagetracerjs/1.2.6/imagetracer_v1.2.6.min.js"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">

    <div class="bg-gray-900 p-8 rounded-2xl w-80 text-center border border-gray-700">
        <h1 class="text-2xl font-bold mb-4 text-cyan-400">VectorForge</h1>
        <input type="file" id="fileInput" class="mb-4">
        <img id="preview" class="hidden mb-4 max-h-32 mx-auto">
        <button id="convertBtn" class="bg-cyan-600 px-4 py-2 rounded w-full">Convert to Vector</button>
        <div id="loader" class="hidden mt-4 text-cyan-400 animate-pulse">OPTIMIZING...</div>
    </div>

    <script>
        const btn = document.getElementById('convertBtn');
        const loader = document.getElementById('loader');
        const input = document.getElementById('fileInput');
        const preview = document.getElementById('preview');

        input.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.src = event.target.result;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        btn.onclick = () => {
            if (!preview.src) return alert("Upload an image first!");
            loader.classList.remove('hidden');
            
            ImageTracer.imageToSVG(preview.src, (svgstr) => {
                const a = document.createElement('a');
                a.href = 'data:image/svg+xml;utf8,' + encodeURIComponent(svgstr);
                a.download = 'vector.svg';
                a.click();
                loader.classList.add('hidden');
            }, 'posterized2');
        };
    </script>
</body>
</html>
