<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .scanning { animation: scan 2s linear infinite; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

    <div class="glass p-8 rounded-3xl border border-gray-800 w-full max-w-lg text-center shadow-2xl">
        <h1 class="text-4xl font-black mb-2 bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">VectorForge</h1>
        <p class="text-gray-400 mb-8">Modern Color-Preserved Image Processor</p>

        <div id="dropZone" class="border-2 border-dashed border-gray-700 rounded-2xl p-10 hover:border-cyan-500 transition-all cursor-pointer relative overflow-hidden">
            <input type="file" id="fileInput" class="absolute inset-0 opacity-0 cursor-pointer">
            <div id="uploadText">Click to upload or drag & drop</div>
            <img id="preview" class="hidden mx-auto max-h-40 rounded-lg">
        </div>

        <button id="convertBtn" class="mt-6 w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-xl font-bold transition-all shadow-lg shadow-cyan-900/50">
            Process & Transform
        </button>

        <div id="loader" class="hidden mt-8">
            <div class="h-1 bg-gray-800 rounded-full overflow-hidden">
                <div class="scanning h-full bg-purple-500 w-20"></div>
            </div>
            <p class="mt-2 text-xs text-purple-400 animate-pulse">OPTIMIZING VECTORS...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/imagetracerjs/1.2.6/imagetracer_v1.2.6.min.js"></script>
<script>
    const btn = document.getElementById('convertBtn');
    const loader = document.getElementById('loader');
    const input = document.getElementById('fileInput');
    const preview = document.getElementById('preview');

    input.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            preview.src = event.target.result;
            preview.classList.remove('hidden');
            document.getElementById('uploadText').classList.add('hidden');
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    btn.onclick = () => {
        if (!preview.src) return alert("Please upload an image first!");
        
        loader.classList.remove('hidden');

        // Use ImageTracer to convert the image to colorful SVG
        // 'posterized2' is a preset that keeps colors vibrant
        ImageTracer.imageToSVG(
            preview.src,
            function(svgstr){
                // Create a download link for the SVG
                const blob = new Blob([svgstr], {type: 'image/svg+xml'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'vectorized-image.svg';
                a.click();
                
                loader.classList.add('hidden');
            },
            'posterized2' 
        );
    };
</script>

</body>
</html>
</html>
