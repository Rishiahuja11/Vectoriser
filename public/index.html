<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="glass p-10 rounded-[2rem] w-full max-w-lg shadow-2xl text-center">
        <h1 class="text-5xl font-extrabold mb-2 bg-gradient-to-br from-blue-400 to-purple-600 bg-clip-text text-transparent">VectorForge</h1>
        <p class="text-gray-500 mb-10">Professional Vectorization Engine</p>

        <form id="uploadForm" class="space-y-6">
            <label class="block border-2 border-dashed border-gray-800 hover:border-blue-500 rounded-3xl p-12 cursor-pointer transition-all">
                <input type="file" id="fileInput" name="image" class="hidden" accept="image/*">
                <span id="labelTxt">Click to select image</span>
            </label>
            <button class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold transition-all">Process Vector</button>
        </form>

        <div id="loader" class="hidden mt-8">
            <div class="h-2 bg-gray-800 rounded-full overflow-hidden"><div class="h-full bg-blue-500 animate-pulse w-full"></div></div>
            <p class="mt-4 text-sm text-blue-400">Processing on Server...</p>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            const formData = new FormData();
            formData.append('image', document.getElementById('fileInput').files[0]);

            const res = await fetch('/convert', { method: 'POST', body: formData });
            const svg = await res.blob();
            
            const url = URL.createObjectURL(svg);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'vectorized.svg';
            a.click();
            loader.classList.add('hidden');
        };
    </script>
</body>
</html>
